server {
    listen 8080;
    server_name _;

    location /stat {
        rtmp_stat all;
    }

    location /stat.xsl {
        root /var/www/html;
    }

    location / {
        root /var/www/html;
        index panel.html;
        try_files $uri $uri/ =404;
    }

    location /hls {
        root /var/www/html;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }
}
